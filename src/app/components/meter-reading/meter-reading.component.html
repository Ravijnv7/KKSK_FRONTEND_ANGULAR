<div class="meter-reading-container">
  <div *ngIf="nozzle && !isReadingRecorded" class="nozzle-reading-form">
    <div class="nozzle-card">
      <div class="nozzle-header">
        <h4>Nozzle {{ nozzle.nozzleNumber }}</h4>
        <span
          class="fuel-type"
          [class.diesel]="nozzle.fuelType === 'Diesel'"
          [class.petrol]="nozzle.fuelType === 'Petrol'"
        >
          {{ nozzle.fuelType }}
        </span>
      </div>

      <div class="nozzle-details">
        <p>
          <strong>System Reading:</strong>
          <span class="reading-value">{{ nozzle.currentReading }} L</span>
        </p>
      </div>

      <form [formGroup]="readingForm" (ngSubmit)="submitReading()" class="reading-form">
        <div class="form-group">
          <label for="readingInput">Enter Opening Meter Reading (liters):</label>
          <input
            id="readingInput"
            type="number"
            formControlName="readingValue"
            placeholder="Enter exact reading from nozzle"
            class="form-control"
            step="0.01"
            autofocus
          />
          <small class="help-text">Read the exact value from the nozzle pump meter</small>
        </div>

        <div class="button-group">
          <button
            type="submit"
            [disabled]="!readingForm.valid || isSubmitting"
            class="btn btn-submit"
          >
            {{ isSubmitting ? 'Recording...' : 'Record Reading' }}
          </button>
        </div>
      </form>
    </div>
  </div>

  <div *ngIf="isReadingRecorded" class="reading-recorded">
    <div class="success-badge">
      <span class="checkmark">✓</span>
      <p>Reading Recorded</p>
    </div>
    <p class="nozzle-label">Nozzle {{ nozzle?.nozzleNumber }} - {{ nozzle?.fuelType }}</p>
  </div>
</div>
